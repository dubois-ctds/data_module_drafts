# Jupyter Book (MyST) GitHub Pages Deploy — dubois-ctds/data_module_drafts
# Settings → Pages → Build and deployment: source must be GitHub Actions (not "Deploy from a branch").
# On push to main: sync myst.yml TOC (module folders per MODULES in .github/sync-myst-toc.py; optional legacy lec/lab/hw), commit if changed, build, deploy to project Pages (/data_module_drafts/).

name: Jupyter Book (MyST) GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BASE_URL: /data_module_drafts

permissions:
  contents: write   # needed to push updated myst.yml when new notebooks are added
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book
      - name: Build HTML Assets
        run: jupyter-book build --html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
